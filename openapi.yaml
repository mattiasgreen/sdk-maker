openapi: 3.0.3
info:
  title: Example Customer API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /customers:
    get:
      operationId: getCustomers
      summary: List all customers
      responses:
        '200':
          description: A list of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
components:
  schemas:
    Customer:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
